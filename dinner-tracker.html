<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dinner Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --green:#1b3a2b; --green-light:#2d5240; --cream:#f3f3ec; --brown:#7a3b12;
    --bg:#fafaf6; --card:#ffffff; --border:#dcdcd2; --text:#262622; --muted:#6b6b62;
    --urgent:#b3441f; --soon:#b8860b; --fine:#3b7a4a;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--green);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header h1{font-size:18px;margin:0;font-weight:700;}
  header .sub{font-size:11.5px;opacity:.8;margin-top:2px;}
  .iobtns{display:flex;gap:8px;}
  .iobtns button{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:6px;padding:7px 12px;font-size:12.5px;cursor:pointer;}
  .iobtns button:hover{background:rgba(255,255,255,.22);}
  nav{display:flex;background:var(--green-light);overflow-x:auto;}
  nav button{flex:1;min-width:110px;background:none;border:none;color:#fff;opacity:.75;padding:11px 8px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  nav button.active{opacity:1;border-bottom-color:#e8c468;font-weight:600;}
  main{max-width:980px;margin:0 auto;padding:16px 14px 60px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
  .panel-title{font-size:15px;font-weight:700;color:var(--green);margin:4px 0 10px;}
  .meal-row{display:flex;gap:12px;align-items:flex-start;}
  .meal-date{min-width:64px;text-align:center;}
  .meal-date .d{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .meal-date .n{font-size:20px;font-weight:700;color:var(--green);}
  .meal-body{flex:1;}
  .meal-title{font-weight:700;font-size:14.5px;color:var(--text);}
  .badge{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:6px;vertical-align:middle;}
  .badge.urgent{background:#fbe3da;color:var(--urgent);}
  .badge.soon{background:#fbf0d4;color:var(--soon);}
  .badge.fine{background:#dff0e1;color:var(--fine);}
  .badge.cooked{background:#e2e2da;color:var(--muted);}
  .meal-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .meal-note{font-size:12.5px;color:var(--brown);margin-top:5px;background:#fbf4ec;border-radius:6px;padding:6px 9px;}
  .row-actions{display:flex;gap:8px;margin-top:8px;}
  .row-actions button{font-size:11.5px;border:1px solid var(--border);background:#fff;border-radius:6px;padding:5px 10px;cursor:pointer;}
  .row-actions button.primary{background:var(--green);color:#fff;border-color:var(--green);}
  .row-actions button:hover{filter:brightness(0.97);}
  details{margin-top:8px;}
  summary{cursor:pointer;font-size:12.5px;color:var(--green);font-weight:600;}
  .ing-list{margin:8px 0 0;padding-left:18px;font-size:13px;}
  .ing-list li{margin-bottom:2px;}
  .ing-list li.type-protein{color:#6b2d2d;}
  .ing-list li.type-legume{color:#5a4317;}
  .steps{margin:8px 0 0;padding-left:18px;font-size:13px;}
  .steps li{margin-bottom:5px;line-height:1.4;}
  .tag{display:inline-block;font-size:10.5px;background:var(--cream);color:var(--green);border-radius:5px;padding:2px 7px;margin:0 4px 4px 0;}
  input[type=text],input[type=date],input[type=number],select,textarea{font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:6px;width:100%;font-family:inherit;}
  label{font-size:12px;color:var(--muted);display:block;margin:8px 0 3px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
  .recipe-card h3{font-size:14px;margin:0 0 4px;color:var(--green);}
  .search-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .search-bar input{flex:1;min-width:160px;}
  .pill-toggle{display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:10px;}
  .pill-toggle button{border:none;background:#fff;padding:6px 12px;font-size:12px;cursor:pointer;}
  .pill-toggle button.active{background:var(--green);color:#fff;}
  .ing-chip-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:230px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px;}
  .ing-chip{font-size:12px;padding:4px 9px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;user-select:none;}
  .ing-chip.on{background:var(--green);color:#fff;border-color:var(--green);}
  .match-bar{height:6px;border-radius:4px;background:var(--cream);overflow:hidden;margin-top:6px;}
  .match-fill{height:100%;background:var(--fine);}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 10px;}
  .footer-note{font-size:11px;color:var(--muted);text-align:center;margin-top:24px;}
  .save-banner{background:#fbf0d4;border:1px solid #e8c468;border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;color:#5a4317;}
  textarea{min-height:50px;resize:vertical;}

  /* ---- Login gate ---- */
  #authGate{position:fixed;inset:0;background:var(--green);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
  #authGate .gate-box{background:#fff;border-radius:12px;padding:28px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.25);}
  #authGate h2{margin:0 0 4px;color:var(--green);font-size:18px;}
  #authGate p{margin:0 0 16px;color:var(--muted);font-size:13px;}
  #authGate input{text-align:center;font-size:15px;margin-bottom:10px;}
  #authGate button{width:100%;background:var(--green);color:#fff;border:none;border-radius:6px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;}
  #authGate button:hover{background:var(--green-light);}
  #authGate .gate-error{color:var(--urgent);font-size:12.5px;min-height:18px;margin-top:8px;}
  .signout-btn{background:rgba(255,255,255,.12)!important;}
</style>
</head>
<body>

<div id="authGate">
  <div class="gate-box">
    <h2>🍽 Dinner Tracker</h2>
    <p>Sign in to continue.</p>
    <form id="gateForm" autocomplete="on">
      <input type="email" id="gateEmail" placeholder="Email" autocomplete="username">
      <input type="password" id="gatePw" placeholder="Password" autocomplete="current-password">
      <button type="submit">Sign In</button>
      <div class="gate-error" id="gateError"></div>
    </form>
  </div>
</div>

<div id="appContent" style="display:none">

<header>
  <div>
    <h1>🍽 Dinner Tracker</h1>
    <div class="sub" id="userSub">Wheat-free · dairy-free · pescatarian meal database</div>
  </div>
  <div class="iobtns">
    <button onclick="loadFile()">⬆ Import Backup</button>
    <button onclick="saveFile()">⬇ Export Backup</button>
    <button class="signout-btn" onclick="window.__fb.signOutUser()">Sign Out</button>
    <input type="file" id="fileInput" accept="application/json" style="display:none" onchange="handleFile(event)">
  </div>
</header>

<nav id="tabs"></nav>
<main id="app"></main>

let state = {
  recipes: JSON.parse(JSON.stringify(SEED_RECIPES)),
  log: JSON.parse(JSON.stringify(SEED_LOG)),
};

let libraryFilter = "";

const TABS = [
  {id:"upcoming", label:"Tonight & Upcoming"},
  {id:"library", label:"Recipe Library"},
  {id:"whatcanimake", label:"What Can I Make?"},
  {id:"history", label:"History"},

];

/* =========================================================
   CLOUD AUTOSAVE (debounced — see Firebase script at bottom)
   ========================================================= */
let saveTimer = null;
function queueSave(){
  if (!window.__fb) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    window.__fb.saveState(state).catch(err => console.error("Cloud save failed:", err));
  }, 500);
}

function recipeById(id){ return state.recipes.find(r => r.id === id); }
function fmtDate(iso){
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US",{weekday:"short", month:"short", day:"numeric"});
}
function daysFromToday(iso){
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso + "T00:00:00");
  return Math.round((d - today) / 86400000);
}
function urgencyBadge(diff){
  if (diff <= 0) return '<span class="badge urgent">Today</span>';
  if (diff === 1) return '<span class="badge soon">Tomorrow</span>';
  if (diff <= 3) return '<span class="badge soon">In '+diff+' days</span>';
  return '<span class="badge fine">In '+diff+' days</span>';
}

/* =========================================================
   RENDER: NAV
   ========================================================= */
function renderNav(){
  const nav = document.getElementById("tabs");
  nav.innerHTML = TABS.map(t =>
    `<button class="${t.id===activeTab?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join("");
}
function setTab(id){ activeTab = id; render(); }

/* =========================================================
   RENDER: UPCOMING
   ========================================================= */
function renderUpcoming(){
  const entries = state.log.filter(l => l.status !== "cooked" && l.status !== "skipped")
    .sort((a,b) => a.date.localeCompare(b.date));
  const cookedRecently = state.log.filter(l => l.status === "cooked")
    .sort((a,b) => b.date.localeCompare(a.date)).slice(0,2);

  let html = `<div class="panel-title">Upcoming dinners</div>`;
  if (entries.length === 0){
    html += `<div class="empty">Nothing scheduled. Add a recipe to your plan from the Recipe Library.</div>`;
  } else {
    entries.forEach(l => {
      const r = recipeById(l.recipeId);
      if (!r) return;
      const diff = daysFromToday(l.date);
      html += renderMealCard(l, r, diff);
    });
  }

  if (cookedRecently.length){
    html += `<div class="panel-title" style="margin-top:18px;">Recently cooked</div>`;
    cookedRecently.forEach(l => {
      const r = recipeById(l.recipeId);
      if (!r) return;
      html += renderMealCard(l, r, null);
    });
  }
  return html;
}

function renderMealCard(l, r, diff){
  const d = new Date(l.date + "T00:00:00");
  const dayName = d.toLocaleDateString("en-US",{weekday:"short"});
  const dayNum = d.getDate();
  let badge = "";
  if (l.status === "cooked") badge = '<span class="badge cooked">Cooked</span>';
  else if (diff !== null) badge = urgencyBadge(diff);

  return `<div class="card">
    <div class="meal-row">
      <div class="meal-date"><div class="d">${dayName}</div><div class="n">${dayNum}</div></div>
      <div class="meal-body">
        <div class="meal-title">${r.title}${badge}</div>
        <div class="meal-meta">Serves ${l.headcount} · ${r.cuisine} · ${r.method} · ~${r.totalMin} min total</div>
        ${l.note ? `<div class="meal-note">${l.note}</div>` : ""}
        <details>
          <summary>Ingredients & steps</summary>
          ${renderIngredientsAndSteps(r)}
        </details>
        <div class="row-actions">
          ${l.status !== "cooked" ? `<button class="primary" onclick="markCooked('${l.id}')">Mark cooked</button>` : ""}
          ${l.status !== "skipped" && l.status !== "cooked" ? `<button onclick="markSkipped('${l.id}')">Skip / push back</button>` : ""}
          <button onclick="editNote('${l.id}')">Edit note</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderIngredientsAndSteps(r){
  const ing = r.ingredients.map(i =>
    `<li class="type-${i.type}">${i.name} – ${i.qty}</li>`).join("");
  const steps = r.steps.map(s => `<li>${s}</li>`).join("");
  return `<ul class="ing-list">${ing}</ul><ol class="steps">${steps}</ol>`;
}

function markCooked(logId){
  const l = state.log.find(x => x.id === logId);
  if (!l) return;
  l.status = "cooked";
  render();
  queueSave();
}
function markSkipped(logId){
  const l = state.log.find(x => x.id === logId);
  if (!l) return;
  l.status = "skipped";
  render();
  queueSave();
}
function editNote(logId){
  const l = state.log.find(x => x.id === logId);
  if (!l) return;
  const v = prompt("Note for this meal:", l.note || "");
  if (v !== null){ l.note = v; render(); queueSave(); }
}

/* =========================================================
   RENDER: LIBRARY
   ========================================================= */
function renderLibrary(){
  let html = `<div class="panel-title">Recipe Library (${state.recipes.length})</div>
  <div class="search-bar">
    <input type="text" placeholder="Search by title, ingredient, or cuisine…" value="${libraryFilter}"
      oninput="libraryFilter=this.value; render()">
  </div>
  <div class="recipe-grid">`;

  const q = libraryFilter.trim().toLowerCase();
  const filtered = state.recipes.filter(r => {
    if (!q) return true;
    const hay = (r.title + " " + r.cuisine + " " + r.ingredients.map(i=>i.name).join(" ")).toLowerCase();
    return hay.includes(q);
  });

  if (filtered.length === 0){
    html += `</div><div class="empty">No recipes match "${libraryFilter}".</div>`;
    return html;
  }

  filtered.forEach(r => {
    const repeatTag = r.repeatOf ? `<span class="tag">Repeat of: ${recipeById(r.repeatOf)?.title.split(",")[0] || ""}</span>` : "";
    html += `<div class="card recipe-card">
      <h3>${r.title}</h3>
      <div class="meal-meta">Serves ${r.servings} · ${r.cuisine} · ${r.method}</div>
      <div class="meal-meta">Active ~${r.activeMin} min · Total ~${r.totalMin} min</div>
      <div style="margin-top:6px;">
        ${r.leftoverFriendly ? '<span class="tag">Leftover-friendly</span>' : ""}
        ${repeatTag}
        ${r.source ? '<span class="tag">Has source</span>' : ""}
      </div>
      <details><summary>Ingredients & steps</summary>${renderIngredientsAndSteps(r)}</details>
      ${r.source ? `<div class="meal-meta" style="margin-top:6px;">Source: ${r.source}</div>` : ""}
      <div class="row-actions">
        <button class="primary" onclick="scheduleRecipe('${r.id}')">Schedule this</button>
      </div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function scheduleRecipe(recipeId){
  const date = prompt("Schedule for which date? (YYYY-MM-DD)", new Date().toISOString().slice(0,10));
  if (!date) return;
  const headcount = parseInt(prompt("Headcount?", "2") || "2", 10);
  state.log.push({id:"l"+Date.now(), recipeId, date, headcount, status:"planned", note:""});
  activeTab = "upcoming";
  render();
  queueSave();
}

/* =========================================================
   RENDER: WHAT CAN I MAKE
   ========================================================= */
function allIngredientNames(){
  const set = new Map();
  state.recipes.forEach(r => r.ingredients.forEach(i => {
    const key = i.name.toLowerCase();
    if (!set.has(key)) set.set(key, {name:i.name, type:i.type});
  }));
  return Array.from(set.values()).sort((a,b) => a.name.localeCompare(b.name));
}

function renderWhatCanIMake(){
  const allIng = allIngredientNames();
  const filtered = allIng.filter(i => i.name.toLowerCase().includes(pantryFilter.toLowerCase()));

  let html = `<div class="panel-title">What can I make?</div>
  <div class="card">
    <label>Tap the ingredients you currently have on hand</label>
    <input type="text" placeholder="Filter ingredient list…" value="${pantryFilter}"
      oninput="pantryFilter=this.value; render()">
    <div class="ing-chip-grid">
      ${filtered.map(i => `<span class="ing-chip ${pantrySelection.has(i.name)?'on':''}"
        onclick="togglePantry('${i.name.replace(/'/g,"\\'")}')">${i.name}</span>`).join("")}
    </div>
    <div class="pill-toggle" style="margin-top:12px;">
      <button class="${matchMode==='overlap'?'active':''}" onclick="matchMode='overlap'; render()">Best overlap</button>
      <button class="${matchMode==='strict'?'active':''}" onclick="matchMode='strict'; render()">Strict (have everything)</button>
    </div>
    <div class="meal-meta">${pantrySelection.size} ingredient(s) selected. <a href="#" onclick="pantrySelection.clear(); render(); return false;">Clear all</a></div>
  </div>`;

  if (pantrySelection.size === 0){
    html += `<div class="empty">Select a few ingredients above to see matching recipes.</div>`;
    return html;
  }

  const results = state.recipes.map(r => {
    const total = r.ingredients.length;
    const have = r.ingredients.filter(i => pantrySelection.has(i.name)).length;
    return {r, have, total, pct: total ? have/total : 0};
  }).filter(x => x.have > 0);

  let shown = results;
  if (matchMode === "strict"){
    shown = results.filter(x => x.have === x.total);
  }
  shown.sort((a,b) => b.pct - a.pct || b.have - a.have);

  html += `<div class="panel-title" style="margin-top:16px;">Matching recipes</div>`;
  if (shown.length === 0){
    html += `<div class="empty">No recipes match those ingredients${matchMode==='strict' ? ' exactly' : ''}. Try selecting more, or switch to Best overlap.</div>`;
  } else {
    shown.forEach(({r, have, total, pct}) => {
      html += `<div class="card recipe-card">
        <h3>${r.title}</h3>
        <div class="meal-meta">Uses ${have} of ${total} ingredients you have · Serves ${r.servings} · ${r.cuisine}</div>
        <div class="match-bar"><div class="match-fill" style="width:${Math.round(pct*100)}%"></div></div>
        <details><summary>Full ingredient list & steps</summary>${renderIngredientsAndSteps(r)}</details>
        <div class="row-actions">
          <button class="primary" onclick="scheduleRecipe('${r.id}')">Schedule this</button>
        </div>
      </div>`;
    });
  }
  return html;
}

function togglePantry(name){
  if (pantrySelection.has(name)) pantrySelection.delete(name);
  else pantrySelection.add(name);
  render();
}

/* =========================================================
   RENDER: HISTORY
   ========================================================= */
function renderHistory(){
  const cooked = state.log.filter(l => l.status === "cooked").sort((a,b) => b.date.localeCompare(a.date));
  const skipped = state.log.filter(l => l.status === "skipped").sort((a,b) => b.date.localeCompare(a.date));
  let html = `<div class="panel-title">Cooked (${cooked.length})</div>`;
  if (cooked.length === 0) html += `<div class="empty">Nothing logged as cooked yet.</div>`;
  cooked.forEach(l => {
    const r = recipeById(l.recipeId);
    if (!r) return;
    html += `<div class="card">
      <div class="meal-title">${fmtDate(l.date)} — ${r.title}</div>
      <div class="meal-meta">Serves ${l.headcount} · ${r.cuisine}</div>
      ${l.note ? `<div class="meal-note">${l.note}</div>` : ""}
    </div>`;
  });
  if (skipped.length){
    html += `<div class="panel-title" style="margin-top:16px;">Skipped / pushed back (${skipped.length})</div>`;
    skipped.forEach(l => {
      const r = recipeById(l.recipeId);
      if (!r) return;
      html += `<div class="card">
        <div class="meal-title">${fmtDate(l.date)} — ${r.title}</div>
        <div class="row-actions"><button onclick="rescheduleSkipped('${l.id}')">Reschedule</button></div>
      </div>`;
    });
  }
  return html;
}
function rescheduleSkipped(logId){
  const l = state.log.find(x => x.id === logId);
  if (!l) return;
  const date = prompt("New date? (YYYY-MM-DD)", new Date().toISOString().slice(0,10));
  if (!date) return;
  l.date = date;
  l.status = "planned";
  render();
  queueSave();
}

/* =========================================================
   RENDER: ADD RECIPE
   ========================================================= */
function renderAddRecipe(){
  return `<div class="panel-title">Add a new recipe</div>
  <div class="card">
    <label>Title</label><input type="text" id="nr-title">
    <div class="grid2">
      <div><label>Servings</label><input type="number" id="nr-servings" value="2"></div>
      <div><label>Cuisine</label><input type="text" id="nr-cuisine"></div>
    </div>
    <div class="grid2">
      <div><label>Active minutes</label><input type="number" id="nr-active" value="20"></div>
      <div><label>Total minutes</label><input type="number" id="nr-total" value="30"></div>
    </div>
    <label>Cooking method</label><input type="text" id="nr-method" placeholder="Stovetop, oven, slow cooker…">
    <label>Ingredients (one per line: name – qty – type)</label>
    <textarea id="nr-ingredients" placeholder="Salmon fillets – 2 (6oz ea) – protein"></textarea>
    <label>Steps (one per line)</label>
    <textarea id="nr-steps" placeholder="Sear salmon skin-down (4 min)."></textarea>
    <label>Source (optional link or note)</label><input type="text" id="nr-source">
    <div class="row-actions" style="margin-top:10px;">
      <button class="primary" onclick="addRecipe()">Save recipe</button>
    </div>
  </div>`;
}

function addRecipe(){
  const title = document.getElementById("nr-title").value.trim();
  if (!title){ alert("Please add a title."); return; }
  const ingLines = document.getElementById("nr-ingredients").value.split("\n").map(s=>s.trim()).filter(Boolean);
  const ingredients = ingLines.map(line => {
    const parts = line.split("–").map(s=>s.trim());
    return {name: parts[0]||line, qty: parts[1]||"", type: (parts[2]||"other").toLowerCase()};
  });
  const steps = document.getElementById("nr-steps").value.split("\n").map(s=>s.trim()).filter(Boolean);
  const id = "custom"+Date.now();
  state.recipes.push({
    id, title,
    servings: parseInt(document.getElementById("nr-servings").value,10) || 2,
    cuisine: document.getElementById("nr-cuisine").value.trim() || "—",
    method: document.getElementById("nr-method").value.trim() || "—",
    activeMin: parseInt(document.getElementById("nr-active").value,10) || 20,
    totalMin: parseInt(document.getElementById("nr-total").value,10) || 30,
    dietary: ["wheat-free","dairy-free","pescatarian"],
    leftoverFriendly: true,
    repeatOf: null,
    source: document.getElementById("nr-source").value.trim() || null,
    ingredients, steps,
  });
  activeTab = "library";
  libraryFilter = "";
  render();
}

/* =========================================================
   SAVE / LOAD
   ========================================================= */
function saveFile(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "dinner-tracker-data.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function loadFile(){ document.getElementById("fileInput").click(); }
function handleFile(evt){
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.recipes || !data.log) throw new Error("Missing recipes/log");
      state = data;
      render();
      queueSave();
      alert("Backup imported and synced to the cloud.");
    } catch(err){
      alert("Couldn't read that file: " + err.message);
    }
  };
  reader.readAsText(file);
  evt.target.value = "";
}

/* =========================================================
   MAIN RENDER
   ========================================================= */
function render(){
  renderNav();
  const app = document.getElementById("app");
  let body = "";
  if (activeTab === "upcoming") body = renderUpcoming();
  else if (activeTab === "library") body = renderLibrary();
  else if (activeTab === "whatcanimake") body = renderWhatCanIMake();
  else if (activeTab === "history") body = renderHistory();
  else if (activeTab === "addrecipe") body = renderAddRecipe();

  app.innerHTML = `
    <div class="save-banner">Synced automatically to the cloud as you make changes — your phone and computer always show the same data. Use <strong>Export Backup</strong> any time you want an offline copy.</div>
    ${body}
    <div class="footer-note">Dinner Tracker · synced live via Firebase.</div>`;
}

/* =========================================================
   CLOUD SYNC — kicks off once Firebase reports a signed-in
   user (see the Firebase module script below). On first ever
   sign-in there's no cloud document yet, so the local seed
   data is pushed up to bootstrap it; after that, this device
   and any other signed-in device stay in sync in real time.
   ========================================================= */
let unsubscribeCloud = null;
let firstSnapshot = true;

function showCloudStatus(message, isError){
  const app = document.getElementById("app");
  if (!app) return;
  const bg = isError ? "#fde8e8" : "var(--card)";
  const fg = isError ? "#7a1f1f" : "var(--muted)";
  app.innerHTML = `<div class="save-banner" style="background:${bg};color:${fg};">${message}</div>`;
}

window.addEventListener("fb-signed-in", () => {
  if (unsubscribeCloud) unsubscribeCloud();
  firstSnapshot = true;
  showCloudStatus("Connecting to your synced data…", false);
  unsubscribeCloud = window.__fb.subscribe(async (data) => {
    if (data && data.recipes && data.log) {
      state = data;
      render();
    } else if (firstSnapshot) {
      // No cloud document yet — bootstrap it with the local seed data.
      try {
        await window.__fb.saveState(state);
        render();
      } catch(err){
        console.error("Bootstrap save failed:", err);
        showCloudStatus("Couldn't create the cloud data document: <strong>" + (err && err.message || err) + "</strong>.<br>In the Firebase console, check that Firestore Database has been created (Firestore Database &rarr; Create database) and that the security rules have been published.", true);
        return;
      }
    }
    firstSnapshot = false;
  }, (err) => {
    showCloudStatus("Couldn't connect to the cloud database: <strong>" + (err && err.message || err) + "</strong>.<br>In the Firebase console, check that Firestore Database has been created and that the security rules have been published (Firestore Database &rarr; Rules).", true);
  });
});

window.addEventListener("fb-signed-out", () => {
  if (unsubscribeCloud) { unsubscribeCloud(); unsubscribeCloud = null; }
});
</script>

</div> <!-- /#appContent -->

<script type="module">
/* =========================================================
   FIREBASE AUTH + FIRESTORE
   Real per-user login (only accounts manually added in the
   Firebase console can sign in — there is no public sign-up
   form here) and a live-synced cloud document that replaces
   the old manual Save/Load-as-the-only-option flow.
   ========================================================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDqSpm_KROvGwy43VnUUs0ZeEIqfynVbk",
  authDomain: "timvarga-dinner-tracker.firebaseapp.com",
  projectId: "timvarga-dinner-tracker",
  storageBucket: "timvarga-dinner-tracker.firebasestorage.app",
  messagingSenderId: "51796761695",
  appId: "1:51796761695:web:21ff52ff3e5c8818618fea"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const HOUSEHOLD_DOC = doc(db, "household", "shared");

window.__fb = {
  currentUser: null,
  signOutUser(){ return signOut(auth); },
  saveState(state){ return setDoc(HOUSEHOLD_DOC, state); },
  subscribe(onData, onError){
    return onSnapshot(
      HOUSEHOLD_DOC,
      (snap) => onData(snap.exists() ? snap.data() : null),
      (err) => {
        console.error("Firestore listen error:", err);
        if (onError) onError(err);
      }
    );
  }
};

const gate = document.getElementById("authGate");
const content = document.getElementById("appContent");
const form = document.getElementById("gateForm");
const emailInput = document.getElementById("gateEmail");
const pwInput = document.getElementById("gatePw");
const errorEl = document.getElementById("gateError");
const userSub = document.getElementById("userSub");

form.addEventListener("submit", async function(e){
  e.preventDefault();
  errorEl.textContent = "";
  try {
    await signInWithEmailAndPassword(auth, emailInput.value.trim(), pwInput.value);
    pwInput.value = "";
  } catch (err) {
    errorEl.textContent = "Sign-in failed — check your email and password.";
  }
});

onAuthStateChanged(auth, (user) => {
  window.__fb.currentUser = user;
  if (user) {
    gate.style.display = "none";
    content.style.display = "";
    if (userSub) userSub.textContent = "Signed in as " + user.email + " · synced live";
    window.dispatchEvent(new CustomEvent("fb-signed-in"));
  } else {
    content.style.display = "none";
    gate.style.display = "";
    errorEl.textContent = "";
    emailInput.focus();
    window.dispatchEvent(new CustomEvent("fb-signed-out"));
  }
});
</script>
