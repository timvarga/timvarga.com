<style>
  :root{
    --green:#1b3a2b; --green-light:#2d5240; --cream:#f3f3ec; --brown:#7a3b12;
    --bg:#fafaf6; --card:#ffffff; --border:#dcdcd2; --text:#262622; --muted:#6b6b62;
    --urgent:#b3441f; --soon:#b8860b; --fine:#3b7a4a;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}

  /* Status banner */
  #sync-bar{
    background:var(--green);color:#fff;text-align:center;
    padding:6px 14px;font-size:11.5px;letter-spacing:.02em;
    display:flex;align-items:center;justify-content:center;gap:7px;
  }
  #sync-bar .dot{
    width:7px;height:7px;border-radius:50%;background:#52c58a;
    flex-shrink:0;
  }
  #sync-bar.offline{background:#5a5550;}
  #sync-bar.offline .dot{background:#aaa;}

  header{background:var(--green);color:#fff;padding:12px 18px;}
  header h1{font-size:17px;margin:0;font-weight:700;}
  header .sub{font-size:11px;opacity:.75;margin-top:2px;}
  nav{display:flex;background:var(--green-light);overflow-x:auto;}
  nav button{flex:1;min-width:100px;background:none;border:none;color:#fff;opacity:.75;padding:10px 8px;font-size:12.5px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  nav button.active{opacity:1;border-bottom-color:#e8c468;font-weight:600;}
  main{max-width:980px;margin:0 auto;padding:14px 14px 50px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
  .panel-title{font-size:15px;font-weight:700;color:var(--green);margin:4px 0 10px;}
  .meal-row{display:flex;gap:12px;align-items:flex-start;}
  .meal-date{min-width:60px;text-align:center;}
  .meal-date .d{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .meal-date .n{font-size:20px;font-weight:700;color:var(--green);}
  .meal-body{flex:1;}
  .meal-title{font-weight:700;font-size:14px;color:var(--text);}
  .badge{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:6px;vertical-align:middle;}
  .badge.urgent{background:#fbe3da;color:var(--urgent);}
  .badge.soon{background:#fbf0d4;color:var(--soon);}
  .badge.fine{background:#dff0e1;color:var(--fine);}
  .badge.cooked{background:#e2e2da;color:var(--muted);}
  .meal-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .meal-note{font-size:12.5px;color:var(--brown);margin-top:5px;background:#fbf4ec;border-radius:6px;padding:6px 9px;}
  details{margin-top:8px;}
  summary{cursor:pointer;font-size:12.5px;color:var(--green);font-weight:600;}
  .ing-list{margin:8px 0 0;padding-left:18px;font-size:13px;}
  .ing-list li{margin-bottom:2px;}
  .ing-list li.type-protein{color:#6b2d2d;}
  .ing-list li.type-legume{color:#5a4317;}
  .steps{margin:8px 0 0;padding-left:18px;font-size:13px;}
  .steps li{margin-bottom:5px;line-height:1.4;}
  .tag{display:inline-block;font-size:10.5px;background:var(--cream);color:var(--green);border-radius:5px;padding:2px 7px;margin:0 4px 4px 0;}
  .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
  .recipe-card h3{font-size:14px;margin:0 0 4px;color:var(--green);}
  .search-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .search-bar input{flex:1;min-width:160px;}
  input[type=text]{font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:6px;width:100%;font-family:inherit;}
  .pill-toggle{display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:10px;}
  .pill-toggle button{border:none;background:#fff;padding:6px 12px;font-size:12px;cursor:pointer;}
  .pill-toggle button.active{background:var(--green);color:#fff;}
  .ing-chip-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px;}
  .ing-chip{font-size:12px;padding:4px 9px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;user-select:none;}
  .ing-chip.on{background:var(--green);color:#fff;border-color:var(--green);}
  .match-bar{height:6px;border-radius:4px;background:var(--cream);overflow:hidden;margin-top:6px;}
  .match-fill{height:100%;background:var(--fine);}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 10px;}
  .footer-note{font-size:11px;color:var(--muted);text-align:center;margin-top:24px;}
  label{font-size:12px;color:var(--muted);display:block;margin:8px 0 3px;}
</style>
</head>

  {id:"l2", recipeId:"r5",  date:"2026-06-27", headcount:2, status:"cooked",  note:""},
  {id:"l3", recipeId:"r20", date:"2026-06-28", headcount:2, status:"planned",
   note:"Added for tonight. Built dairy-free (plant-based butter swap for the corn). Recipe yields 4–6 — with 2 eating, the rest is a ready-made lunch or dinner tomorrow."},
  {id:"l4", recipeId:"r21", date:"2026-06-30", headcount:2, status:"planned",
   note:"Using up the salad mix tonight."},
  {id:"l5", recipeId:"r2",  date:"2026-07-01", headcount:2, status:"planned",
   note:"Mahi mahi comes frozen from Costco, so there's no rush on the fish itself. Cook all 3 fillets even though only 2 are eating; extra makes a great next-day lunch."},
  {id:"l6", recipeId:"r3",  date:"2026-07-02", headcount:3, status:"planned",
   note:"Bumped up a day — the bell peppers are starting to go soft, so let's use them while they're still good."},
  {id:"l7", recipeId:"r7",  date:"2026-07-03", headcount:2, status:"planned",
   note:"Pushed back a day since shrimp was already on the menu last night. Shrimp is still the most perishable thing in the fridge, so don't push this much further without freezing it."},
  {id:"l8", recipeId:"r4",  date:"2026-07-04", headcount:3, status:"planned",
   note:"Least perishable of the leftovers, so it's last."},
  {id:"l9", recipeId:"r8",  date:"2026-07-05", headcount:3, status:"planned",
   note:"Recipe is written for 2 — scale up by about 1.5x."},
  {id:"l10", recipeId:"r9", date:"2026-07-06", headcount:3, status:"planned", note:""},
  {id:"l11", recipeId:"r10",date:"2026-07-07", headcount:3, status:"planned", note:""},
  {id:"l12", recipeId:"r11",date:"2026-07-08", headcount:3, status:"planned", note:""},
];

const TYPE_LABELS = {protein:"Protein", legume:"Legume/Bean", vegetable:"Vegetable", fruit:"Fruit",
  grain:"Grain", condiment:"Condiment/Spice", fermented:"Fermented", other:"Other"};

let state = {
  recipes: JSON.parse(JSON.stringify(SEED_RECIPES)),
  log: JSON.parse(JSON.stringify(SEED_LOG)),
};
let activeTab = "upcoming";
let pantrySelection = new Set();
let pantryFilter = "";
let libraryFilter = "";
let matchMode = "overlap";
let groceryDays = 7;
let groceryChecked = new Set();

const TABS = [
  {id:"upcoming",     label:"Tonight & Upcoming"},
  {id:"grocerylist",  label:"Grocery List"},
  {id:"library",      label:"Recipe Library"},
  {id:"whatcanimake", label:"What Can I Make?"},
  {id:"history",      label:"History"},
];

function recipeById(id){ return state.recipes.find(r => r.id === id); }
function fmtDate(iso){
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US",{weekday:"short", month:"short", day:"numeric"});
}
function daysFromToday(iso){
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso + "T00:00:00");
  return Math.round((d - today) / 86400000);
}
function urgencyBadge(diff){
  if (diff <= 0) return '<span class="badge urgent">Today</span>';
  if (diff === 1) return '<span class="badge soon">Tomorrow</span>';
  if (diff <= 3) return '<span class="badge soon">In '+diff+' days</span>';
  return '<span class="badge fine">In '+diff+' days</span>';
}

function renderNav(){
  const nav = document.getElementById("tabs");
  nav.innerHTML = TABS.map(t =>
    `<button class="${t.id===activeTab?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join("");
}
function setTab(id){ activeTab = id; render(); }

function renderIngredientsAndSteps(r){
  const ing = r.ingredients.map(i =>
    `<li class="type-${i.type}">${i.name} – ${i.qty}${i.frozen ? ' <span style="font-size:10px;background:#ddeeff;color:#1a6090;border-radius:3px;padding:1px 4px;margin-left:3px;">❄ frozen</span>' : ''}</li>`).join("");
  const steps = r.steps.map(s => `<li>${s}</li>`).join("");
  return `<ul class="ing-list">${ing}</ul><ol class="steps">${steps}</ol>`;
}

function renderUpcoming(){
  const entries = state.log.filter(l => l.status !== "cooked" && l.status !== "skipped")
    .sort((a,b) => a.date.localeCompare(b.date));
  const cookedRecently = state.log.filter(l => l.status === "cooked")
    .sort((a,b) => b.date.localeCompare(a.date)).slice(0,3);

  let html = `<div class="panel-title">Upcoming dinners</div>`;
  if (entries.length === 0){
    html += `<div class="empty">Nothing scheduled.</div>`;
  } else {
    entries.forEach(l => {
      const r = recipeById(l.recipeId);
      if (!r) return;
      const diff = daysFromToday(l.date);
      const d = new Date(l.date + "T00:00:00");
      const dayName = d.toLocaleDateString("en-US",{weekday:"short"});
      const dayNum = d.getDate();
      html += `<div class="card">
        <div class="meal-row">
          <div class="meal-date"><div class="d">${dayName}</div><div class="n">${dayNum}</div></div>
          <div class="meal-body">
            <div class="meal-title">${r.title}${urgencyBadge(diff)}</div>
            <div class="meal-meta">Serves ${l.headcount} · ${r.cuisine} · ${r.method} · ~${r.totalMin} min</div>
            ${l.note ? `<div class="meal-note">${l.note}</div>` : ""}
            <details>
              <summary>Ingredients & steps</summary>
              ${renderIngredientsAndSteps(r)}
            </details>
          </div>
        </div>
      </div>`;
    });
  }
  if (cookedRecently.length){
    html += `<div class="panel-title" style="margin-top:18px;">Recently cooked</div>`;
    cookedRecently.forEach(l => {
      const r = recipeById(l.recipeId);
      if (!r) return;
      html += `<div class="card">
        <div class="meal-row">
          <div class="meal-date"><div class="d">${new Date(l.date+"T00:00:00").toLocaleDateString("en-US",{weekday:"short"})}</div><div class="n">${new Date(l.date+"T00:00:00").getDate()}</div></div>
          <div class="meal-body">
            <div class="meal-title">${r.title} <span class="badge cooked">Cooked</span></div>
            <div class="meal-meta">Serves ${l.headcount} · ${r.cuisine}</div>
            ${l.note ? `<div class="meal-note">${l.note}</div>` : ""}
            <details><summary>Ingredients & steps</summary>${renderIngredientsAndSteps(r)}</details>
          </div>
        </div>
      </div>`;
    });
  }
  return html;
}

function renderLibrary(){
  let html = `<div class="panel-title">Recipe Library (${state.recipes.length})</div>
  <div class="search-bar">
    <input type="text" placeholder="Search by title, ingredient, or cuisine…" value="${libraryFilter}"
      oninput="libraryFilter=this.value; render()">
  </div>
  <div class="recipe-grid">`;

  const q = libraryFilter.trim().toLowerCase();
  const filtered = state.recipes.filter(r => {
    if (!q) return true;
    const hay = (r.title + " " + r.cuisine + " " + r.ingredients.map(i=>i.name).join(" ")).toLowerCase();
    return hay.includes(q);
  });

  if (filtered.length === 0){
    html += `</div><div class="empty">No recipes match "${libraryFilter}".</div>`;
    return html;
  }

  filtered.forEach(r => {
    html += `<div class="card recipe-card">
      <h3>${r.title}</h3>
      <div class="meal-meta">Serves ${r.servings} · ${r.cuisine} · ${r.method}</div>
      <div class="meal-meta">Active ~${r.activeMin} min · Total ~${r.totalMin} min</div>
      <div style="margin-top:6px;">
        ${r.leftoverFriendly ? '<span class="tag">Leftover-friendly</span>' : ""}
        ${r.source ? '<span class="tag">Has source</span>' : ""}
      </div>
      <details><summary>Ingredients & steps</summary>${renderIngredientsAndSteps(r)}</details>
      ${r.source ? `<div class="meal-meta" style="margin-top:6px;">Source: ${r.source}</div>` : ""}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function allIngredientNames(){
  const set = new Map();
  state.recipes.forEach(r => r.ingredients.forEach(i => {
    const key = i.name.toLowerCase();
    if (!set.has(key)) set.set(key, {name:i.name, type:i.type});
  }));
  return Array.from(set.values()).sort((a,b) => a.name.localeCompare(b.name));
}

function renderWhatCanIMake(){
  const allIng = allIngredientNames();
  const filtered = allIng.filter(i => i.name.toLowerCase().includes(pantryFilter.toLowerCase()));

  let html = `<div class="panel-title">What can I make?</div>
  <div class="card">
    <label>Tap the ingredients you currently have on hand</label>
    <input type="text" placeholder="Filter ingredient list…" value="${pantryFilter}"
      oninput="pantryFilter=this.value; render()">
    <div class="ing-chip-grid">
      ${filtered.map(i => `<span class="ing-chip ${pantrySelection.has(i.name)?'on':''}"
        onclick="togglePantry('${i.name.replace(/'/g,"\\'")}')">${i.name}</span>`).join("")}
    </div>
    <div class="pill-toggle" style="margin-top:12px;">
      <button class="${matchMode==='overlap'?'active':''}" onclick="matchMode='overlap'; render()">Best overlap</button>
      <button class="${matchMode==='strict'?'active':''}" onclick="matchMode='strict'; render()">Strict (have everything)</button>
    </div>
    <div class="meal-meta">${pantrySelection.size} ingredient(s) selected. <a href="#" onclick="pantrySelection.clear(); render(); return false;">Clear all</a></div>
  </div>`;

  if (pantrySelection.size === 0){
    html += `<div class="empty">Select a few ingredients above to see matching recipes.</div>`;
    return html;
  }

  const results = state.recipes.map(r => {
    const total = r.ingredients.length;
    const have = r.ingredients.filter(i => pantrySelection.has(i.name)).length;
    return {r, have, total, pct: total ? have/total : 0};
  }).filter(x => x.have > 0);

  let shown = matchMode === "strict" ? results.filter(x => x.have === x.total) : results;
  shown.sort((a,b) => b.pct - a.pct || b.have - a.have);

  html += `<div class="panel-title" style="margin-top:16px;">Matching recipes</div>`;
  if (shown.length === 0){
    html += `<div class="empty">No recipes match those ingredients${matchMode==='strict' ? ' exactly' : ''}. Try selecting more, or switch to Best overlap.</div>`;
  } else {
    shown.forEach(({r, have, total, pct}) => {
      html += `<div class="card recipe-card">
        <h3>${r.title}</h3>
        <div class="meal-meta">Uses ${have} of ${total} ingredients you have · Serves ${r.servings} · ${r.cuisine}</div>
        <div class="match-bar"><div class="match-fill" style="width:${Math.round(pct*100)}%"></div></div>
        <details><summary>Full ingredient list & steps</summary>${renderIngredientsAndSteps(r)}</details>
      </div>`;
    });
  }
  return html;
}

function togglePantry(name){
  if (pantrySelection.has(name)) pantrySelection.delete(name);
  else pantrySelection.add(name);
  render();
}

function renderHistory(){
  const cooked = state.log.filter(l => l.status === "cooked").sort((a,b) => b.date.localeCompare(a.date));
  const skipped = state.log.filter(l => l.status === "skipped").sort((a,b) => b.date.localeCompare(a.date));
  let html = `<div class="panel-title">Cooked (${cooked.length})</div>`;
  if (cooked.length === 0) html += `<div class="empty">Nothing logged as cooked yet.</div>`;
  cooked.forEach(l => {
    const r = recipeById(l.recipeId);
    if (!r) return;
    html += `<div class="card">
      <div class="meal-title">${fmtDate(l.date)} — ${r.title}</div>
      <div class="meal-meta">Serves ${l.headcount} · ${r.cuisine}</div>
      ${l.note ? `<div class="meal-note">${l.note}</div>` : ""}
    </div>`;
  });
  if (skipped.length){
    html += `<div class="panel-title" style="margin-top:16px;">Skipped / pushed back (${skipped.length})</div>`;
    skipped.forEach(l => {
      const r = recipeById(l.recipeId);
      if (!r) return;
      html += `<div class="card">
        <div class="meal-title">${fmtDate(l.date)} — ${r.title}</div>
        <div class="meal-meta">${r.cuisine}</div>
      </div>`;
    });
  }
  return html;
}

function renderGroceryList(){
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = state.log
    .filter(l => l.status === "planned" && new Date(l.date + "T00:00:00") >= today)
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0, groceryDays);

  if (upcoming.length === 0){
    return `<div class="panel-title">Grocery List</div><div class="empty">No upcoming planned meals.</div>`;
  }

  const byType = {};
  upcoming.forEach(l => {
    const r = recipeById(l.recipeId);
    if (!r) return;
    r.ingredients.forEach((i, ingIdx) => {
      const type = i.type || "other";
      if (!byType[type]) byType[type] = [];
      byType[type].push({name:i.name, qty:i.qty, frozen:!!i.frozen,
        meal:r.title.split(",")[0], key:l.id+"_"+ingIdx});
    });
  });

  const typeOrder = ["protein","vegetable","fruit","legume","grain","fermented","condiment","other"];

  let html = `<div class="panel-title">Grocery List</div>
  <div class="card">
    <div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:8px;">Covering ${upcoming.length} meals:</div>
    ${upcoming.map(l => {
      const r = recipeById(l.recipeId);
      const d = new Date(l.date+"T00:00:00");
      const label = d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
      return `<div style="font-size:12.5px;color:var(--text);margin-bottom:3px;">📅 ${label} — ${r ? r.title.split(",")[0] : "?"}</div>`;
    }).join("")}
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
      <button onclick="groceryDays=5; render()" style="font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:${groceryDays===5?"var(--green)":"#fff"};color:${groceryDays===5?"#fff":"var(--text)"};">5 meals</button>
      <button onclick="groceryDays=7; render()" style="font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:${groceryDays===7?"var(--green)":"#fff"};color:${groceryDays===7?"#fff":"var(--text)"};">7 meals</button>
      <button onclick="groceryChecked.clear(); render()" style="font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:#fff;color:var(--muted);">Clear checks</button>
    </div>
  </div>`;

  let totalItems = 0;
  typeOrder.forEach(type => {
    const items = byType[type];
    if (!items || !items.length) return;
    totalItems += items.length;
    html += `<div class="card">
      <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:6px;">${TYPE_LABELS[type]||type}</div>`;
    items.forEach(item => {
      const checked = groceryChecked.has(item.key);
      const frozenTag = item.frozen
        ? ` <span style="font-size:10px;background:#ddeeff;color:#1a6090;border-radius:4px;padding:1px 5px;margin-left:4px;">❄ frozen</span>` : "";
      html += `<label style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;">
        <input type="checkbox" ${checked?"checked":""} onchange="toggleGrocery('${item.key}')"
          style="width:18px;height:18px;margin-top:1px;flex-shrink:0;accent-color:var(--green);">
        <div style="flex:1;${checked?"opacity:0.4;text-decoration:line-through;":""}">
          <span style="font-size:13.5px;">${item.name}${frozenTag}</span>
          <span style="font-size:12px;color:var(--muted);margin-left:6px;">${item.qty}</span>
          <div style="font-size:11px;color:var(--muted);margin-top:1px;">${item.meal}</div>
        </div>
      </label>`;
    });
    html += `</div>`;
  });

  html += `<div class="footer-note">${groceryChecked.size} of ${totalItems} items checked off · tap to mark what you already have</div>`;
  return html;
}

function toggleGrocery(key){
  if (groceryChecked.has(key)) groceryChecked.delete(key);
  else groceryChecked.add(key);
  render();
}

function render(){
  renderNav();
  const app = document.getElementById("app");
  let body = "";
  if (activeTab === "upcoming")     body = renderUpcoming();
  if (activeTab === "grocerylist")  body = renderGroceryList();
  if (activeTab === "library")      body = renderLibrary();
  if (activeTab === "whatcanimake") body = renderWhatCanIMake();
  if (activeTab === "history")      body = renderHistory();
  app.innerHTML = body;
}

// Initial render from seed data
render();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDqSpm_KROvGwy43VnUUs0ZeEIqfynVbk",
  authDomain: "timvarga-dinner-tracker.firebaseapp.com",
  projectId: "timvarga-dinner-tracker",
  storageBucket: "timvarga-dinner-tracker.firebasestorage.app",
  messagingSenderId: "51796761695",
  appId: "1:51796761695:web:21ff52ff3e5c8818618fea"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const HOUSEHOLD_DOC = doc(db, "household", "shared");
const syncBar = document.getElementById("sync-bar");
const syncMsg = document.getElementById("sync-msg");

onSnapshot(
  HOUSEHOLD_DOC,
  (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      if (data && data.recipes && data.log) {
        state = data;
        render();
        syncBar.classList.remove("offline");
        syncMsg.textContent = "Live · read-only";
      }
    }
  },
  (err) => {
    console.log("Firestore read unavailable:", err.code, "— showing sample data.");
    syncBar.classList.add("offline");
    syncMsg.textContent = "Showing sample data · live sync unavailable";
  }
);
</script>
